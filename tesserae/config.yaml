name: Tesserae
version: "0.44.4"
slug: tesserae
description: Self-hosted dashboard companion for e-ink panels. Compose dashboards in a browser, render headless, push to your Pi / ESP32 / Kindle / TRMNL hardware.
url: https://github.com/dmellok/tesserae
arch:
  - aarch64
  - amd64
init: false
startup: services
boot: auto
ingress: true
ingress_port: 8765
panel_icon: mdi:view-quilt
panel_title: Tesserae
ports:
  # Also expose port 8765 on the host so MQTT-push devices, jailbroken
  # Kindles, native TRMNL hardware, and Home Assistant's generic-camera
  # integration can reach Tesserae directly. The ingress proxy is only
  # for the UI inside the HA iframe.
  "8765/tcp": 8765
ports_description:
  "8765/tcp": Tesserae API + TRMNL BYOS HTTP endpoint
homeassistant_api: false
# hassio_api: true lets Tesserae call back to HA Supervisor's local
# add-on API. We use exactly one endpoint — ``network/info`` — to
# resolve the host's LAN IP at startup so panels on the LAN have a
# reachable address to fetch render frames from (rather than the
# docker bridge IP they'd otherwise see).
hassio_api: true
host_network: false
map:
  - share:rw
image: ghcr.io/dmellok/tesserae
# HA Supervisor sets these on the container before it starts. Together
# they tell Tesserae:
#   * to bypass its own password gate when X-Ingress-Path is present
#     (HA Supervisor authenticated the user upstream)
#   * to put its persistent state under /data (the add-on's persistent
#     volume that Supervisor automatically backs up across upgrades)
environment:
  TESSERAE_HA_INGRESS: "1"
  TESSERAE_DATA_ROOT: "/data"
  # Host-side port the stable add-on publishes Tesserae on. Tesserae
  # uses this in MQTT push payloads so panels know where to fetch
  # render frames — under HA Ingress ``request.host`` is the HA
  # frontend's port (8123), not ours, so we can't derive it from a
  # request. Matches the ``ports:`` entry above.
  TESSERAE_HTTP_PORT: "8765"
  # Internal port Tesserae binds inside the container. ``TESSERAE_HTTP_PORT``
  # above is the host-side mapping (what external clients hit), which can
  # differ from this if the user overrides the Network tab. The headless
  # renderer needs the internal port for its loopback connection.
  TESSERAE_BIND_PORT: "8765"
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
  mqtt_host: str?
  mqtt_port: port?
  mqtt_username: str?
  mqtt_password: password?
options:
  log_level: info
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
