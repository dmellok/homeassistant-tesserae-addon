name: Tesserae Edge
version: "0.64.8-edge.140b87c"
slug: tesserae_edge
description: "EDGE channel — auto-built from every commit on Tesserae's main branch. Expect breakage. Use Tesserae (stable) for anything you depend on."
url: https://github.com/dmellok/tesserae
arch:
  - aarch64
  - amd64
init: false
startup: services
boot: auto
ingress: true
ingress_port: 8765
panel_icon: mdi:view-quilt-outline
panel_title: Tesserae Edge
ports:
  # Edge exposes on 8766 so it doesn't collide with the stable add-on
  # (which uses 8765). Both can run side by side, and edge is still
  # reachable from LAN clients / generic-camera entities directly.
  "8765/tcp": 8766
ports_description:
  "8765/tcp": Tesserae Edge API + TRMNL BYOS HTTP endpoint (host port 8766)
homeassistant_api: false
# hassio_api: true lets Tesserae call back to HA Supervisor's local
# add-on API. We use exactly one endpoint — ``network/info`` — to
# resolve the host's LAN IP at startup so panels on the LAN have a
# reachable address to fetch render frames from (rather than the
# docker bridge IP they'd otherwise see).
hassio_api: true
host_network: false
map:
  - share:rw
image: ghcr.io/dmellok/tesserae
environment:
  TESSERAE_HA_INGRESS: "1"
  TESSERAE_DATA_ROOT: "/data"
  # Host-side port the edge add-on publishes Tesserae on. The container
  # still binds 8765 internally, but the ports: mapping above publishes
  # it on host 8766 so it doesn't clash with the stable add-on (which
  # owns 8765). Without this Tesserae would emit panel URLs pointing
  # at :8765 — wrong host port for edge clients.
  TESSERAE_HTTP_PORT: "8766"
  # Tesserae always binds 8765 inside the container; the ports: mapping
  # publishes it on host 8766. The headless renderer needs the internal
  # port for its loopback connection — otherwise it'd try 127.0.0.1:8766
  # and connection-refuse.
  TESSERAE_BIND_PORT: "8765"
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
  mqtt_host: str?
  mqtt_port: port?
  mqtt_username: str?
  mqtt_password: password?
options:
  log_level: info
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
